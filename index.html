<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Un Souffle Juste Pour Toi</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
      font-size: 24px;
      font-style: italic;
      color: #cc66ff;
    }

    .lecteur {
      position: relative;
      width: 90%;
      max-width: 500px;
      margin: 20px auto;
    }

    .fond {
      width: 100%;
      display: block;
      position: relative;
      z-index: 2;
    }

    .disque {
      position: absolute;
      top: 47%;
      left: 45.8%;
      width: 56%;
      z-index: 1;
      transform-origin: center center;
      animation: rotationDisque 6s linear infinite;
      pointer-events: none;
    }

    iframe {
      width: 90%;
      max-width: 500px;
      height: 300px;
      margin: 20px auto;
      display: block;
      border: 0;
    }

    @keyframes rotationDisque {
      from {
        transform: translate(-50%, -50%) rotate(-16deg) skewX(-8deg) scaleY(0.84) rotate(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotate(-16deg) skewX(-8deg) scaleY(0.84) rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <h1>Un Souffle Juste Pour Toi</h1>

  <div class="lecteur">
    <img src="fond.png" class="fond" alt="Fond tourne-disque" />
    <img src="disque.png" class="disque" alt="Disque" />
  </div>

  <iframe
    src="https://www.youtube.com/embed/U3_djdjsI5Q"
    title="je t'accuse"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</body>
</html>
