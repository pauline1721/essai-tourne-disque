<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Un Souffle Juste Pour Toi</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
      font-size: 24px;
      font-style: italic;
      color: #cc66ff;
    }

    .lecteur {
      position: relative;
      width: 90%;
      max-width: 500px;
      margin: 20px auto;
    }

    .fond {
      width: 100%;
      height: auto;
      display: block;
    }

    .disque {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 65%;
  transform: translate(-50%, -50%);
  animation: rotation 8s linear infinite;
  transform-origin: center center;
  z-index: 2; /* disque au dessus */
}

.fond {
  position: relative;
  z-index: 1; /* fond en dessous */
}

    iframe {
      width: 90%;
      max-width: 500px;
      height: 300px;
      margin: 20px auto;
      display: block;
      position: relative;
      z-index: 3;
    }

    @keyframes rotation {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <h1>Un Souffle Juste Pour Toi</h1>

  <div class="lecteur">
    <img src="disque.png" class="disque" alt="Disque" />
    <img src="fond.png" class="fond" alt="Tourne-disque" />
  </div>
  
  <!-- 🔁 Remplace le lien ci-dessous par celui de ta chanson YouTube (format https://www.youtube.com/embed/XXXXXXXXXXX) -->
  <iframe src="https://www.youtube.com/embed/U3_djdjsl5Q"
    title="je t'accuse"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</body>
</html>
