<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Un Souffle Juste Pour Toi</title>

  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
      font-size: 24px;
      font-style: italic;
      color: #cc66ff;
    }

    .lecteur {
      position: relative;
      width: 90%;
      max-width: 500px;
      margin: 20px auto 30px auto;
      aspect-ratio: 1536 / 1024;
      overflow: visible;
    }

    .fond {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }

    .disque {
      position: absolute;
      width: 57%;
      left: 20.8%;
      top: 19.2%;
      z-index: 2;
      transform-origin: 50% 50%;
      animation: spin 5s linear infinite;
      pointer-events: none;
    }

    .bras {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 3;
      pointer-events: none;
    }

    iframe {
      width: 90%;
      max-width: 500px;
      height: 300px;
      margin: 20px auto;
      display: block;
      border: 0;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <h1>Un Souffle Juste Pour Toi</h1>

  <div class="lecteur">
    <img src="fond_bas.png" class="fond" alt="" />
    <img src="disque.png" class="disque" alt="" />
    <img src="bras.png" class="bras" alt="" />
  </div>

  <iframe
    src="https://www.youtube.com/embed/U3_djdjsI5Q"
    title="Je t'accuse"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>

</body>
</html>
