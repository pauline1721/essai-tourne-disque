<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Un Souffle Juste Pour Toi</title>

  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
      font-size: 24px;
      font-style: italic;
      color: #cc66ff;
    }

    /* CONTENEUR TOURNE-DISQUE */
    .lecteur {
      position: relative;
      width: 90%;
      max-width: 500px;
      margin: 30px auto;
    }

    /* IMAGE DE BASE */
    .fond {
      width: 100%;
      display: block;
    }

    /* DISQUE */
    .disque {
      position: absolute;
      top: 22%;      /* ajuste si besoin */
      left: 50%;
      width: 58%;    /* ajuste selon ton image */
      transform: translateX(-50%);
      transform-origin: center center;
      animation: rotation 6s linear infinite;
      z-index: 2;
    }

    /* BRAS AU-DESSUS */
    .bras {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 3;
      pointer-events: none;
    }

    /* ANIMATION */
    @keyframes rotation {
      from {
        transform: translateX(-50%) rotate(0deg);
      }
      to {
        transform: translateX(-50%) rotate(360deg);
      }
    }

    iframe {
      width: 90%;
      max-width: 500px;
      height: 300px;
      margin: 20px auto;
      display: block;
    }
  </style>
</head>

<body>

  <h1>Un Souffle Juste Pour Toi</h1>

  <div class="lecteur">
    <img src="fond_bas.png" class="fond" />
    <img src="disque.png" class="disque" />
    <img src="bras.png" class="bras" />
  </div>

  <!-- 🎵 MET TON LIEN YOUTUBE ICI -->
  <iframe src="https://www.youtube.com/embed/U3_djdjsI5Q"
    title="Je t'accuse"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>

</body>
</html>
